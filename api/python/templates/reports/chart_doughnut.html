<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ browser_title|e }}</title>
    <script>
    (function () {
        try {
            var m = document.cookie.match(/(?:^|; )ix2-theme=([^;]*)/);
            var mode = m ? decodeURIComponent(m[1]).toLowerCase().trim() : '';
            if (mode !== 'dark' && mode !== 'light') mode = localStorage.getItem('ix2-theme') || '';
            if (mode !== 'dark' && mode !== 'light') mode = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', mode);
            document.documentElement.style.colorScheme = mode === 'dark' ? 'dark' : 'light';
        } catch (e) {}
    })();
    </script>
    <link rel="stylesheet" href="/assets/css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/dashboard-vista-tabla-iconos.css">
    <link rel="stylesheet" href="/assets/css/dt-tabla-listado-sip.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; }
        .reporte-modulo-main { padding: 1rem; max-width: 1100px; margin: 0 auto; }
        .page-head .reporte-inline-meta { margin: 0.35rem 0 0; color: var(--muted, #64748b); font-size: 0.9rem; }
        .reporte-toolbar { display: flex; gap: 0.65rem; margin: 0 0 1rem; }
        #reporte-pdf-root table.data-table tbody td { padding: 0.65rem 0.85rem; border-bottom: 1px solid var(--border, #e2e8f0); }
        .reporte-page { display: flex; flex-direction: column; gap: 1.25rem; }
        .reporte-chart-section { background: var(--surface, #fff); border: 1px solid var(--border, #e2e8f0); border-radius: 0.75rem; padding: 1rem 1.25rem; }
        .chart-inner { position: relative; height: min(55vh, 420px); }
    </style>
</head>
<body data-app-company="{{ app_company|e }}" data-pdf-logo="/assets/img/empresa-logo.png">
    <main class="reporte-modulo-main">
        <div class="reporte-page">
            <div class="page-head">
                <h1>{{ h1|e }}</h1>
                <p class="reporte-inline-meta">{{ meta|e }}</p>
            </div>
            <div class="tabla-listado-wrapper">
                <div class="reporte-toolbar"><button type="button" class="btn btn-primary" id="btn-pdf">Descargar PDF</button></div>
                <div id="reporte-pdf-root">
                    <h2 class="pdf-h2">{{ pdf_h2|e }}</h2>
                    <div class="table-wrapper overflow-x-auto productos-dt-skin">
                        <table class="data-table config-table display stripe rct-auto">
                            <thead><tr>{% for th in table_headers %}<th>{{ th|e }}</th>{% endfor %}</tr></thead>
                            <tbody>
                            {% for row in table_rows %}
                                <tr>{% for cell in row %}<td>{{ cell|e }}</td>{% endfor %}</tr>
                            {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <section class="reporte-chart-section" aria-label="Gráfico">
                <h3 class="reporte-chart-heading">Gráfico</h3>
                <div class="chart-inner"><canvas id="ch"></canvas></div>
            </section>
        </div>
    </main>
    <script>
    (function () {
        var payload = {{ chart_payload | tojson }};
        var done = false;
        function build() {
            if (done || !window.Chart) return;
            var ctx = document.getElementById('ch');
            if (!ctx || !payload.labels) return;
            var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: payload.labels,
                    datasets: [{ data: payload.valores, backgroundColor: ['#3b82f6','#a855f7','#22c55e','#f97316','#ec4899','#14b8a6','#eab308','#64748b'] }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: isDark ? '#e2e8f0' : '#0f172a' } } },
                },
            });
            done = true;
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', build);
        else build();
    })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
    <script src="/assets/js/reporte_pdf.js"></script>
    <script>ventasBindPdfDownload('btn-pdf', 'reporte-pdf-root', {{ pdf_name|tojson }});</script>
    <script src="/assets/js/report-table-ctrl.js"></script>
</body>
</html>
